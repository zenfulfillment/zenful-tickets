name: release

# Builds zenfultickets for macOS (universal), Windows (x64), and Linux (x64)
# using the official `tauri-apps/tauri-action`, and publishes
# a GitHub Release with bundles + `latest.json` for the auto-updater.
#
# Pattern follows: https://v2.tauri.app/distribute/pipelines/github/
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY            — contents of ~/.tauri/zenfultickets.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   — password used at key generation (empty if none)
#   ELEVENLABS_API_KEY                   — baked into the binary via option_env!
#
# The updater public key + endpoint live in src-tauri/tauri.conf.json
# (plugins.updater.{pubkey,endpoints}). Endpoint is the GitHub Releases
# `latest/download/latest.json` redirect, so it always points at the newest tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # Create the draft GitHub Release ONCE before any matrix build runs. Without
  # this, every matrix entry calls into tauri-action with `tagName` set, all
  # four entries race to create a release for the same tag, GitHub honours
  # exactly one of them, and the other three uploaders end up posting their
  # bundles to a phantom release that's later discarded — leaving the final
  # release with only one platform's assets. The matrix below references
  # `releaseId` (instead of `tagName`) so every uploader targets THIS draft.
  #
  # Pattern from the official Tauri 2 GitHub Actions pipeline guide:
  # https://v2.tauri.app/distribute/pipelines/github/
  create-release:
    name: create draft release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v6
      - name: Create or look up draft release
        id: create
        # v8 is the Node.js 24-compatible release; v7 still ships Node 20
        # and trips the runner's deprecation warning.
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            // Reuse an existing draft for this tag if one is hanging around
            // from a prior failed run — saves the user a manual cleanup
            // step when they re-trigger after a flaky build.
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existing = releases.find(r => r.tag_name === tag && r.draft);
            if (existing) {
              core.info(`Reusing existing draft release id=${existing.id} for ${tag}`);
              return existing.id;
            }
            const created = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Zenful Tickets ${tag}`,
              body: 'See the assets below to download this version.',
              draft: true,
              prerelease: false,
            });
            core.info(`Created draft release id=${created.data.id} for ${tag}`);
            return created.data.id;
          result-encoding: string

  build:
    name: build (${{ matrix.platform }} ${{ matrix.args }})
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Universal macOS build — single binary runs natively on both
          # Apple Silicon (arm64) and Intel (x86_64).
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal macOS requires both architectures.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Universal macOS build — single matrix entry, both architectures
      # included via --target universal-apple-darwin. Cache key includes
      # matrix.args so it stays distinct from other platforms.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      # `releaseId` points each matrix uploader at the SAME draft release
      # created in the prior job. Setting `tagName` here instead causes all
      # four matrix entries to race-create a release for the same tag —
      # GitHub honours one and the others' uploads are silently lost. See
      # the comment on the `create-release` job above.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # After all matrix builds finish: mirror each platform's primary bundle to a
  # stable filename (so README download buttons can use a permanent
  # /releases/latest/download/<name> URL), then promote the draft release.
  #
  # We intentionally do NOT generate latest.json ourselves — recent versions of
  # tauri-action attach a fully-featured latest.json to the draft release with
  # richer platform keys (darwin-aarch64-app, linux-x86_64-deb/rpm/appimage,
  # windows-x86_64-nsis/msi, etc.) than our hand-rolled mapping ever covered.
  finalize-release:
    name: finalize release (mirror assets + publish)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Mirror each platform's primary user-facing bundle under a stable,
      # version-less filename so the README "Download" buttons can link to
      # `releases/latest/download/<stable-name>` and resolve correctly across
      # all future releases. The original versioned bundles (and their .sig
      # files) remain untouched — the auto-updater still reads them via
      # latest.json.
      - name: Mirror per-platform assets to stable filenames
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p mirror

          # Pairs of: <stable name>|<gh release download glob>
          # Every entry in this list MUST resolve — a missing pattern means a
          # platform build job didn't upload its bundle, which is a hard
          # release failure (we don't want the auto-updater to ship a release
          # that's missing platforms). Genuinely platform-skipped entries
          # belong in `optional_mirrors` below.
          required_mirrors=(
            "Zenful-Tickets-macOS-universal.dmg|*universal.dmg"
            "Zenful-Tickets-Windows-x64.setup.exe|*x64-setup.exe"
            "Zenful-Tickets-Linux-x64.AppImage|*amd64.AppImage"
          )

          # Print what's actually on the release up front. Makes failures
          # diagnosable without needing to re-trigger the workflow.
          echo "── Release assets currently attached to $TAG ──"
          gh release view "$TAG" --repo "$REPO" --json assets \
            --jq '.assets[].name' | sed 's/^/  • /'
          echo "──────────────────────────────────────────────"

          missing=()
          for entry in "${required_mirrors[@]}"; do
            stable="${entry%%|*}"
            pattern="${entry#*|}"
            echo "→ mirroring $pattern → $stable"
            rm -rf mirror/* || true
            if ! gh release download "$TAG" --repo "$REPO" \
                  --pattern "$pattern" --dir mirror --clobber 2>/dev/null; then
              echo "  ✗ no asset matched '$pattern'"
              missing+=("$stable ($pattern)")
              continue
            fi
            # shellcheck disable=SC2206
            matches=( mirror/* )
            if [[ ${#matches[@]} -eq 0 || ! -f "${matches[0]}" ]]; then
              echo "  ✗ download produced no files for '$pattern'"
              missing+=("$stable ($pattern)")
              continue
            fi
            cp "${matches[0]}" "mirror/$stable"
            gh release upload "$TAG" "mirror/$stable" --repo "$REPO" --clobber
            echo "  ✓ uploaded $stable"
          done

          if (( ${#missing[@]} > 0 )); then
            echo
            echo "❌ Release is incomplete — the following platform bundles never landed:"
            for m in "${missing[@]}"; do echo "   • $m"; done
            echo
            echo "Fix the failing matrix build (or remove the entry from required_mirrors)"
            echo "before promoting the release."
            exit 1
          fi

      - name: Promote release from draft to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release edit "$TAG" --repo "$REPO" --draft=false
