name: release

# Builds zenfultickets for macOS (arm64 + x64), Windows (x64), and Linux (x64)
# using the official `tauri-apps/tauri-action`, signs each artifact, and publishes
# a GitHub Release with bundles + `latest.json` for the auto-updater.
#
# Pattern follows: https://v2.tauri.app/distribute/pipelines/github/
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY            — contents of ~/.tauri/zenfultickets.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   — password used at key generation (empty if none)
#   ELEVENLABS_API_KEY                   — baked into the binary via option_env!
#
# The updater public key + endpoint live in src-tauri/tauri.conf.json
# (plugins.updater.{pubkey,endpoints}). Endpoint is the GitHub Releases
# `latest/download/latest.json` redirect, so it always points at the newest tag.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.platform }} ${{ matrix.args }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # IMPORTANT: include matrix.args in the cache key. Without it, both
      # macOS jobs (`--target aarch64-apple-darwin` and
      # `--target x86_64-apple-darwin`) run on the same `macos-latest` image
      # and rust-cache keys default to `${{ runner.os }}` + Cargo.lock —
      # which means the two architectures clobber each other's caches. The
      # symptom is one of the two macOS .dmg files (usually arm64) shipping
      # mis-targeted artifacts that fail to launch on the user's machine.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Zenful Tickets ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # After all matrix builds finish: mirror each platform's primary bundle to a
  # stable filename (so README download buttons can use a permanent
  # /releases/latest/download/<name> URL), then promote the draft release.
  #
  # We intentionally do NOT generate latest.json ourselves — recent versions of
  # tauri-action attach a fully-featured latest.json to the draft release with
  # richer platform keys (darwin-aarch64-app, linux-x86_64-deb/rpm/appimage,
  # windows-x86_64-nsis/msi, etc.) than our hand-rolled mapping ever covered.
  finalize-release:
    name: finalize release (mirror assets + publish)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Mirror each platform's primary user-facing bundle under a stable,
      # version-less filename so the README "Download" buttons can link to
      # `releases/latest/download/<stable-name>` and resolve correctly across
      # all future releases. The original versioned bundles (and their .sig
      # files) remain untouched — the auto-updater still reads them via
      # latest.json.
      - name: Mirror per-platform assets to stable filenames
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p mirror

          # Pairs of: <stable name>|<gh release download glob>
          # Every entry in this list MUST resolve — a missing pattern means a
          # platform build job didn't upload its bundle, which is a hard
          # release failure (we don't want the auto-updater to ship a release
          # that's missing platforms). Genuinely platform-skipped entries
          # belong in `optional_mirrors` below.
          required_mirrors=(
            "Zenful-Tickets-macOS-arm64.dmg|*aarch64.dmg"
            "Zenful-Tickets-macOS-x64.dmg|*x64.dmg"
            "Zenful-Tickets-Windows-x64-setup.exe|*x64-setup.exe"
            "Zenful-Tickets-Linux-x64.AppImage|*amd64.AppImage"
          )

          # Print what's actually on the release up front. Makes failures
          # diagnosable without needing to re-trigger the workflow.
          echo "── Release assets currently attached to $TAG ──"
          gh release view "$TAG" --repo "$REPO" --json assets \
            --jq '.assets[].name' | sed 's/^/  • /'
          echo "──────────────────────────────────────────────"

          missing=()
          for entry in "${required_mirrors[@]}"; do
            stable="${entry%%|*}"
            pattern="${entry#*|}"
            echo "→ mirroring $pattern → $stable"
            rm -rf mirror/* || true
            if ! gh release download "$TAG" --repo "$REPO" \
                  --pattern "$pattern" --dir mirror --clobber 2>/dev/null; then
              echo "  ✗ no asset matched '$pattern'"
              missing+=("$stable ($pattern)")
              continue
            fi
            # shellcheck disable=SC2206
            matches=( mirror/* )
            if [[ ${#matches[@]} -eq 0 || ! -f "${matches[0]}" ]]; then
              echo "  ✗ download produced no files for '$pattern'"
              missing+=("$stable ($pattern)")
              continue
            fi
            cp "${matches[0]}" "mirror/$stable"
            gh release upload "$TAG" "mirror/$stable" --repo "$REPO" --clobber
            echo "  ✓ uploaded $stable"
          done

          if (( ${#missing[@]} > 0 )); then
            echo
            echo "❌ Release is incomplete — the following platform bundles never landed:"
            for m in "${missing[@]}"; do echo "   • $m"; done
            echo
            echo "Fix the failing matrix build (or remove the entry from required_mirrors)"
            echo "before promoting the release."
            exit 1
          fi

      - name: Promote release from draft to published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release edit "$TAG" --repo "$REPO" --draft=false
